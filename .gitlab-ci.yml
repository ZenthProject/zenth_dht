image: rust:latest

variables:
  DEBIAN_FRONTEND: "noninteractive"
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  APP_NAME: zenth_dht
  HARBOR_IMAGE: "$HARBOR_HOST/$HARBOR_PROJECT/zenth-dht"

stages:
  - build
  - package
  - deploy

# ── Build ─────────────────────────────────────────────────────────────────────
build:
  stage: build
  timeout: 90m

  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends \
        cmake gcc clang libclang-dev pkg-config \
        libssl-dev libpq-dev protobuf-compiler git ca-certificates
    - rustc --version && cargo --version

  script:
    # Auth git pour les dépendances privées (zenth_dto, zenth_requests)
    - |
      printf "machine %s\nlogin oauth2\npassword %s\n" \
        "$(echo $HARBOR_HOST)" "$GITLAB_TOKEN" > /root/.netrc
      chmod 600 /root/.netrc
    - CARGO_NET_GIT_FETCH_WITH_CLI=true cargo build --release --bin zenth_dht
    - rm -f /root/.netrc

  artifacts:
    paths:
      - target/release/zenth_dht
    expire_in: 1 day

  only:
    - main
    - develop

# ── Package → Harbor ──────────────────────────────────────────────────────────
package:
  stage: package
  needs: [build]

  image: docker:27

  services:
    - docker:27-dind

  variables:
    DOCKER_TLS_CERTDIR: "/certs"

  before_script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_HOST" -u "$HARBOR_USERNAME" --password-stdin

  script:
    - TAG="${CI_COMMIT_SHORT_SHA}"
    - docker build -f Dockerfile.prebuilt -t "$HARBOR_IMAGE:$TAG" -t "$HARBOR_IMAGE:latest" .
    - docker push "$HARBOR_IMAGE:$TAG"
    - docker push "$HARBOR_IMAGE:latest"
    - echo "Image disponible sur ${HARBOR_URL}/harbor/projects/${HARBOR_PROJECT}/repositories/zenth-dht"

  only:
    - main

# ── Deploy ────────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  needs: [package]

  image: debian:bookworm-slim

  before_script:
    - apt-get update -qq
    - apt-get install -y --no-install-recommends openssh-client
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

  script:
    - TAG="${CI_COMMIT_SHORT_SHA}"
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" bash -s << EOF
        set -euo pipefail
        cd /srv/docker/d-builds/zenth_dht

        echo "$HARBOR_PASSWORD" | docker login "$HARBOR_HOST" -u "$HARBOR_USERNAME" --password-stdin
        docker pull "$HARBOR_IMAGE:$TAG"
        docker tag  "$HARBOR_IMAGE:$TAG" zenth_dht:latest

        docker compose -f docker-compose.prod.yml run --rm migrations
        docker compose -f docker-compose.prod.yml up -d --no-deps app

        echo "Déployé avec succès : $TAG"
      EOF

  environment:
    name: production

  only:
    - main
