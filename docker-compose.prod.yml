services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    # Postgres ne doit jamais être exposé à l'extérieur
    # Pas de directive 'ports' volontairement

  # ── Migrations (one-shot) ─────────────────────────────────────────────────
  migrations:
    image: ${REGISTRY:-zenth_dht}-migrations:${TAG:-latest}
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}?sslmode=disable
      PGSSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"
    security_opt:
      - no-new-privileges:true

  # ── Application ───────────────────────────────────────────────────────────
  app:
    image: ${REGISTRY:-zenth_dht}:${TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}?sslmode=disable
      HOST:         0.0.0.0
      PORT:         8081
      RUST_LOG:     ${RUST_LOG:-info}
      APP_VERSION:     ${APP_VERSION}
      PGSSLMODE:       disable
      RUSTFS_BASE_URL: ${RUSTFS_BASE_URL}
      # TLS désactivé : NPM gère HTTPS/WSS en terminaison
    ports:
      # Exposé uniquement en local — NPM accède via npm_net (par nom de conteneur)
      # Garder ce binding pour debug local uniquement, à supprimer si inutile
      - "127.0.0.1:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - internal
      - npm_net
    # Désactive le HEALTHCHECK du Dockerfile (arg --health-check inexistant dans main.rs)
    healthcheck:
      disable: true
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=10m,mode=1777
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  internal:
    driver: bridge
  # Réseau externe géré par Nginx Proxy Manager — permet à NPM de proxifier vers zenth_dht-app:8081
  npm_net:
    external: true

volumes:
  pg_data:
    driver: local
